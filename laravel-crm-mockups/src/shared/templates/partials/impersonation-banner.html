<!-- Impersonation Banner - Show when admin is viewing as an organization -->
<div class="impersonation-banner" id="impersonation-banner" style="display: none;">
  <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
  </svg>
  <span class="font-medium">Viewing as: <span id="impersonation-org-name">Lincoln Elementary School</span></span>
  <button class="px-3 py-1 bg-white/20 hover:bg-white/30 rounded text-sm font-medium" onclick="exitImpersonation()">
    Exit View
  </button>
</div>

<script>
  // Check impersonation state on load
  document.addEventListener('DOMContentLoaded', () => {
    const impersonation = window.demoState?.get('impersonation');
    if (impersonation?.active) {
      document.getElementById('impersonation-banner').style.display = '';
      document.getElementById('impersonation-org-name').textContent = impersonation.orgName;
    }
  });

  function exitImpersonation() {
    window.demoState?.set('impersonation', { active: false, orgId: null, orgName: null });
    window.location.href = '/src/admin/organizations/index.html';
  }
</script>

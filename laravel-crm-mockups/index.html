<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calico Spanish CRM Mockups</title>
  <link rel="stylesheet" href="./src/shared/styles/base.css">
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #482d8b 50%, #68c9c9 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
    }
    .logo span {
      color: #9fcc3f;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 3rem;
    }
    .portals {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
    }
    .portal-card {
      background: white;
      border-radius: 1rem;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .portal-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }
    .portal-icon {
      width: 64px;
      height: 64px;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .portal-icon svg {
      width: 32px;
      height: 32px;
      color: white;
    }
    .portal-icon-admin {
      background: #482d8b;
    }
    .portal-icon-portal {
      background: #9fcc3f;
    }
    .portal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.5rem;
    }
    .portal-description {
      font-size: 0.875rem;
      color: #64748b;
      line-height: 1.5;
    }
    @media (max-width: 640px) {
      .portals {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">Calico <span>Spanish</span></h1>
    <p class="subtitle">Membership & Licensing CRM Mockups</p>

    <div class="portals">
      <a href="./src/admin/index.html" class="portal-card">
        <div class="portal-icon portal-icon-admin">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
          </svg>
        </div>
        <h2 class="portal-title">Internal Admin CRM</h2>
        <p class="portal-description">
          Manage organizations, billing accounts, license pools, users, and support tickets.
        </p>
      </a>

      <a href="./src/portal/index.html" class="portal-card">
        <div class="portal-icon portal-icon-portal">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
        </div>
        <h2 class="portal-title">Organization Portal</h2>
        <p class="portal-description">
          Customer-facing portal for managing licenses, seats, roster, and School-to-Home access.
        </p>
      </a>
    </div>
  </div>
</body>
</html>
